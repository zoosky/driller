name: Rust

on: [pull_request, push]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo test

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy -- -D warnings

  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  coverage:
    name: Code coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@cargo-tarpaulin

      - name: Run cargo-tarpaulin
        run: cargo tarpaulin --out Xml --ignore-tests

  examples:
    name: Examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build driller
        run: cargo build --release
      - name: Build example server
        run: cargo build --release --manifest-path example/server/Cargo.toml
      - name: Run example plans against the example server
        env:
          ITERATIONS: "2"
          EDITOR: users
        run: |
          set -uo pipefail
          ./example/server/target/release/driller-example-server \
            --responses-dir example/server/responses &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          up=0
          for _ in $(seq 1 50); do
            # Stop waiting if the server process died (e.g. failed to bind).
            kill -0 "$server_pid" 2>/dev/null || break
            if curl -sf http://127.0.0.1:9000/api/users.json >/dev/null 2>&1; then up=1; break; fi
            sleep 0.2
          done
          if [ "$up" -ne 1 ]; then
            echo "::error::example server did not become ready on :9000 (failed to bind?)"
            exit 1
          fi
          driller=./target/release/driller
          rc=0
          # Run every standalone plan (those with a top-level `plan:` key);
          # comments/subcomments/subtags are include fragments, exercised via
          # their parents. Gate on a clean exit AND no connection errors -- the
          # latter catches a wrong-port / server-down regression that a bare
          # exit code misses (driller reports those as failed requests but
          # still exits 0).
          for plan in $(cd example && grep -lE '^plan:' *.yml); do
            echo "::group::$plan"
            out=$("$driller" run --benchmark "example/$plan" --stats 2>&1)
            prc=$?
            echo "$out"
            echo "::endgroup::"
            if [ "$prc" -ne 0 ]; then echo "::error::$plan exited $prc"; rc=1; fi
            if echo "$out" | grep -q 'Error connecting'; then
              echo "::error::$plan produced connection errors"; rc=1
            fi
          done
          exit "$rc"
