name: Bug Report
description: Report a bug in driller
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: Driller version
      description: Output of `driller --version`
      placeholder: "driller 0.10.0-alpha.3"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS and architecture
      placeholder: "macOS 15.5 aarch64 / Ubuntu 24.04 x86_64"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: benchmark
    attributes:
      label: Benchmark YAML (minimized)
      description: The smallest YAML that reproduces the issue.
      render: yaml
  - type: textarea
    id: output
    attributes:
      label: Full error output
      render: text
